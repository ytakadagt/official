<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yoichi Takada</title>

<meta name="description" content="Yoichi Takada Official Website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#111;
    color:#fff;
    font-family:"Inter",sans-serif;
}

/* ---------- HERO ---------- */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoom 18s ease forwards;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.22);
}

/* ---------- TITLE ---------- */

.title{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-55%);

    z-index:2;

    font-family:"Cormorant Garamond",serif;

    font-size:clamp(64px,9vw,140px);

    font-weight:400;

    letter-spacing:.03em;

    text-align:center;

}

/* ---------- SAVE THE DATE ---------- */

.date{

    position:absolute;

    left:50%;

    bottom:60px;

    transform:translateX(-50%);

    z-index:2;

    text-align:center;

    text-transform:uppercase;

    color:white;

}

.date .save{

    font-size:14px;

    letter-spacing:.45em;

    opacity:.8;

}

.date .day{

    margin-top:10px;

    font-size:26px;

    letter-spacing:.28em;

    font-family:"Cormorant Garamond",serif;

}

/* ---------- CONTENT ---------- */

.content{

    max-width:720px;

    margin:120px auto;

    padding:0 35px;

}

h2{

    font-size:12px;

    letter-spacing:.3em;

    text-transform:uppercase;

    margin-bottom:30px;

    color:#bdbdbd;

    font-weight:400;

}

.bio{

    font-size:16px;

    line-height:2.2;

    color:#e5e5e5;

    margin-bottom:70px;

}

.contact{

    margin-bottom:60px;

}

.contact a,
.social a{

    color:white;

    text-decoration:none;

    transition:.3s;

}

.contact a:hover,
.social a:hover{

    opacity:.6;

}

.social{

    display:flex;

    gap:40px;

    flex-wrap:wrap;

}

footer{

    text-align:center;

    padding:60px;

    color:#777;

    font-size:12px;

}

/* ---------- ANIMATION ---------- */

@keyframes zoom{

    from{
        transform:scale(1.05);
    }

    to{
        transform:scale(1);
    }

}

@media(max-width:768px){

.title{

    font-size:58px;

}

.date .save{

    font-size:11px;

}

.date .day{

    font-size:22px;

}

.bio{

    font-size:15px;

}

.social{

    flex-direction:column;

    gap:18px;

}

}

</style>

</head>

<body>

<section class="hero">

<img src="artist.jpg" alt="Yoichi Takada">

<div class="title">
Yoichi Takada
</div>

<div class="date">

<div class="save">
SAVE THE DATE
</div>

<div class="day">
AUGUST 20
</div>

</div>

</section>

<section class="content">

<h2>PROFILE</h2>

<div class="bio">

2006年生まれ、作曲家・ギタリスト。<br><br>

2022年よりAnnoyzにて活動。その傍ら、光分解や零進法（band set）でのサポートも行った。<br><br>

2026年7月にAnnoyz活動休止後、Yoichi Takada名義でソロ活動開始。

</div>

<h2>CONTACT</h2>

<div class="contact">

ytakadagt@gmail.com
</a>

</div>

<h2>SOCIAL</h2>

<div class="social">

X
</a>

Instagram
</a>

</div>

</section>

<footer>

© 2026 Yoichi Takada

</footer>

</body>
</html>
