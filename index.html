<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yoichi Takada</title>

<meta name="description" content="Yoichi Takada Official Website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:#111;
    color:#fff;
    font-family:"Inter",sans-serif;

}

/* ---------- HERO ---------- */

.hero{

    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;

}

.hero img{

    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoom 20s linear forwards;

}

.hero::after{

    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);

}

.title{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:2;

    font-family:"Cormorant Garamond",serif;

    font-size:clamp(54px,9vw,120px);

    letter-spacing:.04em;

    text-align:center;

    font-weight:400;

}

.date{

    position:absolute;

    bottom:40px;
    left:50%;

    transform:translateX(-50%);

    z-index:2;

    font-size:13px;

    letter-spacing:.35em;

    text-transform:uppercase;

}

/* ---------- CONTENT ---------- */

.content{

    max-width:760px;

    margin:120px auto;

    padding:0 35px;

}

.section-title{

    font-size:12px;

    letter-spacing:.3em;

    text-transform:uppercase;

    margin-bottom:35px;

    color:#bdbdbd;

}

.bio{

    font-size:16px;

    line-height:2.2;

    color:#e0e0e0;

    margin-bottom:80px;

}

.contact{

    margin-bottom:80px;

}

.contact a{

    color:white;

    text-decoration:none;

    border-bottom:1px solid rgba(255,255,255,.3);

    transition:.3s;

}

.contact a:hover{

    border-color:white;

}

.social{

    display:flex;

    gap:40px;

    flex-wrap:wrap;

}

.social a{

    color:white;

    text-decoration:none;

    letter-spacing:.18em;

    text-transform:uppercase;

    font-size:13px;

    transition:.3s;

}

.social a:hover{

    opacity:.6;

}

footer{

    text-align:center;

    padding:60px 20px;

    color:#777;

    font-size:12px;

}

@keyframes zoom{

    from{

        transform:scale(1.05);

    }

    to{

        transform:scale(1);

    }

}

@media(max-width:768px){

.title{

    font-size:56px;

}

.bio{

    font-size:15px;

}

.social{

    flex-direction:column;

    gap:18px;

}

}

</style>

</head>

<body>

</div>

</section>
